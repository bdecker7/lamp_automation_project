; board = adafruit_feather_esp32s2
; framework = espidf



[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf

monitor_port = /dev/tty.usbserial-0001
monitor_speed = 115200
build_flags = 
    -DCONFIG_ESP_CONSOLE_UART_BAUDRATE=115200

monitor_filters = default
board_build.sdkconfig = sdkconfig.esp32dev
; monitor_speed = 74880
; extra_configs =
;     sdkconfig.defaults
